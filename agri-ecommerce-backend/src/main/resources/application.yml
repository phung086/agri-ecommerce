server:
  port: 8080

spring:
  application:
    name: agri-ecommerce-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/veggie_main?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  messages:
    basename: messages/messages
    encoding: UTF-8

  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    locations: classpath:db/migration
    baseline-on-migrate: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
app:
  jwt:
    secret: ${JWT_SECRET:AgriEcommerceJwtSecretKeyForLocalDevelopmentMustBeAtLeast32Chars2026}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
