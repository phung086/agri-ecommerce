server:
  port: 8080

spring:
  application:
    name: agri-ecommerce-backend

  datasource:
    url: jdbc:mysql://localhost:3306/veggie_main?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 080604
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

springdoc:
  swagger-ui:
    path: /swagger-ui.html
app:
  jwt:
    secret: ${JWT_SECRET:AgriEcommerceJwtSecretKeyForLocalDevelopmentMustBeAtLeast32Chars2026}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}