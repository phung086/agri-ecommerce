spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    root: INFO
    org.hibernate.SQL: WARN

app:
  auth:
    password-reset:
      expose-token: false
  public:
    base-url: ${APP_PUBLIC_BASE_URL:https://agrimarket.example.com}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:${APP_PUBLIC_BASE_URL:https://agrimarket.example.com}}
  payment:
    vnpay:
      pay-url: ${VNPAY_PAY_URL:https://pay.vnpay.vn/vpcpay.html}
      tmn-code: ${VNPAY_TMN_CODE}
      hash-secret: ${VNPAY_HASH_SECRET}
      return-url: ${VNPAY_RETURN_URL:${APP_PUBLIC_BASE_URL:https://agrimarket.example.com}/checkout/vnpay-return}
      expire-minutes: ${VNPAY_EXPIRE_MINUTES:15}
